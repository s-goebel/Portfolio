<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeitstrahl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #0a0908;
    --bg-deep: #15120f;
    --bg-warm: #1f1b16;
    --surface: rgba(35, 30, 24, 0.55);
    --surface-solid: #231e18;
    --border: rgba(212, 180, 131, 0.18);
    --border-strong: rgba(212, 180, 131, 0.45);

    --text: #f5f0e8;
    --text-dim: #a39a88;
    --text-mute: #6b6356;

    --gold: #d4b483;
    --gold-bright: #e8c988;
    --gold-deep: #a8895a;
    --copper: #b87333;
    --burgundy: #8b2635;

    --shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 10px 30px rgba(0, 0, 0, 0.4);
    --shadow-gold: 0 20px 60px rgba(212, 180, 131, 0.15);

    --stem-length: 70px; /* Länge der "Schnur" zwischen Nagel und Box */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background: var(--bg-void);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(184, 115, 51, 0.08), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(139, 38, 53, 0.06), transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(212, 180, 131, 0.04), transparent 70%);
  }

  /* ---------- Eingabe ---------- */
  .input-view {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    transition: opacity .6s ease, transform .6s ease;
    position: relative;
    z-index: 2;
  }

  .input-view.hidden {
    opacity: 0;
    transform: translateY(-20px);
    pointer-events: none;
    position: absolute;
  }

  .ornament {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    color: var(--gold);
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .ornament::before, .ornament::after {
    content: '';
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-deep));
  }
  .ornament::after {
    background: linear-gradient(90deg, var(--gold-deep), transparent);
  }

  .input-view h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
    text-align: center;
  }

  .input-view h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--gold-bright), var(--copper));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 400;
  }

  .input-view p {
    color: var(--text-dim);
    margin-bottom: 35px;
    text-align: center;
    max-width: 540px;
    font-size: 1rem;
    line-height: 1.7;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    backdrop-filter: blur(24px) saturate(1.3);
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 35px;
    width: 100%;
    max-width: 860px;
    box-shadow: var(--shadow);
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    padding: 1px;
    background: linear-gradient(135deg, var(--gold-deep), transparent 40%, transparent 60%, var(--gold-deep));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.5;
    pointer-events: none;
  }

  textarea {
    width: 100%;
    min-height: 320px;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 0.88rem;
    padding: 22px;
    resize: vertical;
    transition: border-color .3s, box-shadow .3s;
    line-height: 1.7;
  }

  textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212, 180, 131, 0.12);
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 25px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    font-weight: 500;
    font-size: 0.9rem;
    padding: 13px 26px;
    border: none;
    cursor: pointer;
    transition: all .3s cubic-bezier(.2,.9,.3,1);
    letter-spacing: 0.03em;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    color: var(--bg-void);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    opacity: 0;
    transition: opacity .3s;
  }

  .btn-primary span { position: relative; z-index: 1; }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 30px rgba(212, 180, 131, 0.25);
  }

  .btn-primary:hover::before { opacity: 1; }

  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  .btn-secondary:hover {
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(212, 180, 131, 0.05);
  }

  /* ---------- Zeitstrahl ---------- */
  .timeline-view {
    height: 100vh;
    display: none;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }

  .timeline-view.active { display: flex; }

  .header {
    padding: 22px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10, 9, 8, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-mark {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 12px rgba(212, 180, 131, 0.6);
  }

  .header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .header h2 em {
    font-style: italic;
    color: var(--gold);
  }

  .hint {
    color: var(--text-mute);
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .timeline-container {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    position: relative;
    cursor: grab;
  }

  .timeline-container:active { cursor: grabbing; }

  .timeline-container::-webkit-scrollbar { height: 8px; }
  .timeline-container::-webkit-scrollbar-track { background: var(--bg-deep); }
  .timeline-container::-webkit-scrollbar-thumb {
    background: linear-gradient(90deg, transparent, var(--gold-deep), transparent);
    border-radius: 4px;
  }

  .timeline {
    display: flex;
    align-items: stretch;
    padding: 0 180px;
    min-height: 100%;
    position: relative;
  }

  .line {
    position: absolute;
    top: 50%;
    left: 0;
    height: 1px;
    transform: translateY(-50%);
    z-index: 0;
    pointer-events: none;
  }

  .line::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--gold-deep) 8%,
      var(--gold) 50%,
      var(--gold-deep) 92%,
      transparent 100%);
    box-shadow: 0 0 12px rgba(212, 180, 131, 0.4);
  }

  .line::after {
    content: '';
    position: absolute;
    top: -3px;
    left: 0;
    right: 0;
    height: 7px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(212, 180, 131, 0.15) 10%,
      rgba(212, 180, 131, 0.25) 50%,
      rgba(212, 180, 131, 0.15) 90%,
      transparent 100%);
    filter: blur(4px);
  }

  /* NEU: year-node ist ein absolut positionierter Container */
  .year-node {
    position: relative;
    flex-shrink: 0;
    width: 340px;
    margin: 0 80px;
    min-height: 100%;
    z-index: 1;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1s cubic-bezier(.2,.9,.3,1), transform 1s cubic-bezier(.2,.9,.3,1);
  }

  .year-node.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* NAGEL / REISNAGEL: Sitzt EXAKT auf der Mittellinie */
  .year-anchor {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 14px;
    margin-top: -7px;
    margin-left: -7px;
    background: var(--gold);
    transform: rotate(45deg);
    z-index: 3;
    box-shadow:
      0 0 14px rgba(212, 180, 131, 0.9),
      0 0 28px rgba(212, 180, 131, 0.4),
      inset 0 0 0 2px var(--bg-void);
    transition: transform 0.6s cubic-bezier(.2,.9,.3,1), box-shadow 0.6s;
  }

  /* Nagel rotiert beim Hover */
  .year-node:hover .year-anchor {
    transform: rotate(225deg) scale(1.25);
    box-shadow:
      0 0 22px rgba(212, 180, 131, 1),
      0 0 45px rgba(212, 180, 131, 0.7),
      inset 0 0 0 2px var(--bg-void);
  }

  /* SCHNUR / STEM: geht vom Nagel nach oben oder unten */
  .year-stem {
    position: absolute;
    left: 50%;
    width: 1px;
    height: var(--stem-length);
    transform: translateX(-50%);
    z-index: 1;
    pointer-events: none;
  }

  .year-stem::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, var(--gold), var(--gold-deep));
  }

  .year-stem::after {
    content: '';
    position: absolute;
    left: 50%;
    width: 1px;
    height: 100%;
    transform: translateX(-50%);
    background: var(--gold);
    filter: blur(3px);
    opacity: 0.4;
  }

  /* Ungerade: Schnur geht NACH OBEN vom Nagel */
  .year-node:nth-child(odd) .year-stem {
    bottom: 50%;
  }
  .year-node:nth-child(odd) .year-stem::before {
    background: linear-gradient(to top, var(--gold), var(--gold-deep));
  }

  /* Gerade: Schnur geht NACH UNTEN vom Nagel */
  .year-node:nth-child(even) .year-stem {
    top: 50%;
  }

  /* BOX: hängt am Ende der Schnur */
  .year-card {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 330px;
    padding: 26px 26px 28px;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.5s cubic-bezier(.2,.9,.3,1), box-shadow 0.5s, border-color 0.5s;
    z-index: 2;
  }

  .year-card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(212, 180, 131, 0.08);
    border-radius: 2px;
    pointer-events: none;
    transition: border-color .5s;
  }

  .year-card:hover::before {
    border-color: rgba(212, 180, 131, 0.3);
  }

  /* Ungerade: Box OBEN der Linie - hängt an der Schnur */
  .year-node:nth-child(odd) .year-card {
    bottom: calc(50% + var(--stem-length));
  }

  /* Gerade: Box UNTEN der Linie - hängt an der Schnur */
  .year-node:nth-child(even) .year-card {
    top: calc(50% + var(--stem-length));
  }

  .year-card:hover {
    transform: translateX(-50%) translateY(-5px);
    border-color: var(--border-strong);
    box-shadow: var(--shadow), var(--shadow-gold);
  }

  .year-node:nth-child(even) .year-card:hover {
    transform: translateX(-50%) translateY(5px);
  }

  .year-card-header {
    position: relative;
    z-index: 1;
  }

  .year-eyebrow {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    color: var(--gold-deep);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .year-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 500;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
    margin-bottom: 14px;
  }

  .divider {
    width: 36px;
    height: 1px;
    background: var(--gold-deep);
    margin-bottom: 14px;
  }

  .year-card-body {
    max-height: 2000px;
    opacity: 1;
    overflow: hidden;
    transition: max-height 0.6s cubic-bezier(.2,.9,.3,1), opacity 0.4s ease;
  }

  .year-card.collapsed .year-card-body {
    max-height: 0;
    opacity: 0;
  }

  .events {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .event {
    display: flex;
    align-items: flex-start;
    gap: 11px;
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.55;
    font-weight: 300;
  }

  .event-bullet {
    color: var(--gold);
    font-size: 0.65rem;
    flex-shrink: 0;
    margin-top: 6px;
    opacity: 0.9;
  }

  .has-review {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    font-size: 0.7rem;
    padding: 6px 11px;
    background: rgba(212, 180, 131, 0.08);
    border: 1px solid var(--gold-deep);
    color: var(--gold);
    border-radius: 2px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }

  .has-review:hover {
    background: rgba(212, 180, 131, 0.18);
    border-color: var(--gold);
    transform: translateY(-1px);
  }

  .collapse-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    padding: 6px 0;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-mute);
    border-top: 1px solid var(--border);
    transition: color 0.3s;
    cursor: pointer;
  }

  .year-card.has-many-events .collapse-toggle {
    display: flex;
  }

  .year-card.has-many-events .collapse-toggle:hover {
    color: var(--gold);
  }

  .collapse-toggle svg {
    width: 11px;
    height: 11px;
    transition: transform 0.4s cubic-bezier(.2,.9,.3,1);
  }

  .year-card.collapsed .collapse-toggle svg {
    transform: rotate(180deg);
  }

  .collapse-label-more, .collapse-label-less {
    display: inline-block;
  }
  .year-card.collapsed .collapse-label-less { display: none; }
  .year-card:not(.collapsed) .collapse-label-more { display: none; }

  .year-summary {
    display: none;
    font-size: 0.82rem;
    color: var(--text-dim);
    font-style: italic;
    padding-top: 10px;
  }

  .year-card.collapsed .year-summary {
    display: block;
  }

  .year-summary strong {
    color: var(--gold);
    font-style: normal;
    font-weight: 500;
  }

  /* ---------- Modal ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 4, 3, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .5s ease;
    padding: 20px;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    width: 100%;
    max-width: 760px;
    height: 85vh;
    max-height: 720px;
    background: linear-gradient(180deg, #1a1612 0%, #0f0d0a 100%);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8), 0 0 60px rgba(212, 180, 131, 0.08);
    transform: translateY(20px) scale(0.97);
    transition: transform .6s cubic-bezier(.2,.9,.3,1);
    position: relative;
  }

  .modal::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    padding: 1px;
    background: linear-gradient(135deg, var(--gold-deep), transparent 30%, transparent 70%, var(--gold-deep));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    opacity: 0.6;
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 0, 0, 0.2);
  }

  .modal-title-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .modal-label {
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    color: var(--text-mute);
    text-transform: uppercase;
    font-weight: 500;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .modal-title em {
    font-style: italic;
    color: var(--gold);
  }

  .close-btn {
    background: transparent;
    color: var(--text-dim);
    padding: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid transparent;
    cursor: pointer;
  }

  .close-btn:hover {
    background: rgba(212, 180, 131, 0.08);
    color: var(--gold);
    border-color: var(--border);
  }

  .close-btn svg {
    width: 18px;
    height: 18px;
  }

  .modal-body {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .page {
    position: absolute;
    inset: 0;
    padding: 50px 50px 70px;
    overflow-y: auto;
    opacity: 0;
    transform: translateX(50px);
    transition: opacity .5s ease, transform .5s ease;
    pointer-events: none;
  }

  .page.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
  }

  .page::-webkit-scrollbar { width: 6px; }
  .page::-webkit-scrollbar-track { background: transparent; }
  .page::-webkit-scrollbar-thumb {
    background: var(--gold-deep);
    border-radius: 3px;
  }

  .page-chapter {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 500;
  }

  .page-chapter::before {
    content: '';
    width: 30px;
    height: 1px;
    background: var(--gold);
  }

  .page h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    margin-bottom: 28px;
    color: var(--text);
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  .page h3::first-letter {
    color: var(--gold);
  }

  .page-ornament {
    width: 100%;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    position: relative;
  }

  .page-ornament::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-deep), transparent);
  }

  .page-ornament::after {
    content: '◆';
    position: relative;
    background: #14110e;
    padding: 0 14px;
    color: var(--gold);
    font-size: 0.6rem;
    z-index: 1;
  }

  .page p {
    font-size: 1.08rem;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    font-weight: 300;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.01em;
  }

  .modal-footer {
    padding: 22px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 0, 0, 0.25);
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 2px;
    padding: 11px 20px;
    cursor: pointer;
  }

  .nav-btn svg {
    width: 14px;
    height: 14px;
    transition: transform .3s;
  }

  .nav-btn:hover:not(:disabled) {
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(212, 180, 131, 0.05);
  }

  .nav-btn:hover:not(:disabled) svg.arrow-left { transform: translateX(-3px); }
  .nav-btn:hover:not(:disabled) svg.arrow-right { transform: translateX(3px); }

  .nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 20px;
    height: 2px;
    background: var(--border);
    transition: all .4s cubic-bezier(.2,.9,.3,1);
    cursor: pointer;
    border-radius: 1px;
  }

  .dot:hover { background: var(--text-dim); }

  .dot.active {
    background: var(--gold);
    width: 36px;
    box-shadow: 0 0 8px rgba(212, 180, 131, 0.5);
  }

  .page-indicator {
    position: absolute;
    top: 28px;
    right: 40px;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--text-mute);
    font-weight: 500;
  }

  .page-indicator .current { color: var(--gold); }

  @media (max-width: 600px) {
    :root { --stem-length: 50px; }
    .timeline { padding: 0 80px; }
    .year-card { width: 270px; padding: 22px 20px; }
    .year-node { width: 280px; margin: 0 40px; }
    .year-number { font-size: 2.8rem; }
    .page { padding: 35px 28px 70px; }
    .page h3 { font-size: 1.9rem; }
    .modal { height: 92vh; }
    .modal-header { padding: 20px 24px; }
    .modal-footer { padding: 18px 24px; }
    .header { padding: 18px 20px; }
    .nav-btn { padding: 10px 14px; }
    .nav-btn span { display: none; }
  }
</style>
</head>
<body>

<div class="input-view" id="inputView">
  <div class="ornament">Chronicle</div>
  <h1>Dein <em>Zeitstrahl</em></h1>
  <p>Setze die Meilensteine deines Lebens in Szene. Füge deinen Markdown-Text ein und erschaffe eine zeitlose Chronik deiner Erinnerungen.</p>
  <div class="card">
    <textarea id="mdInput" placeholder="# 1999
##### Einschneidend
- Geboren
- laufen gelernt
### Rückblick
##### Laufen
Die ersten Schritte waren ziemlich flappsig..."></textarea>
    <div class="btn-row">
      <button class="btn-secondary" id="loadExample">Beispiel laden</button>
      <button class="btn-primary" id="generate"><span>Chronik erschaffen →</span></button>
    </div>
  </div>
</div>

<div class="timeline-view" id="timelineView">
  <div class="header">
    <div class="header-left">
      <div class="header-mark"></div>
      <h2>Chronik <em>der Jahre</em></h2>
    </div>
    <div class="hint">Scrollen · Klicken · Erinnern</div>
    <button class="btn-secondary" id="backToInput">Bearbeiten</button>
  </div>
  <div class="timeline-container" id="timelineContainer">
    <div class="timeline" id="timeline">
      <div class="line" id="timelineLine"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title-wrap">
        <div class="modal-label">Rückblick</div>
        <div class="modal-title">Anno <em id="modalYear"></em></div>
      </div>
      <button class="close-btn" id="closeModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="nav-btn" id="prevPage">
        <svg class="arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        <span>Zurück</span>
      </button>
      <div class="dots" id="dots"></div>
      <button class="nav-btn" id="nextPage">
        <span>Weiter</span>
        <svg class="arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const EXAMPLE = `# 1999
##### Einschneidend
- Geboren
- laufen gelernt
### Rückblick
##### Laufen
Die ersten Schritte waren ziemlich flappsig aber ich habe es dann doch irgendwann geschafft!
Meine Eltern waren sicherlich stolz.
##### Windeln
Windeln müssen echt reudig gewesen sein.
Die haben bestimmt bestialisch gestunken.
# 2000
##### Einschneidend
- Millenium
- erster Zoo-Besuch
# 2001
##### Einschneidend
- 2 Jahre alt geworden
- erste Erinnerung, die bis heute hält
### Rückblick
##### Urlaub
Wir waren auf jeden Fall auf einem Bauernhof!
Und mein Bruder hat Schach gegen den Bauersjungen gespielt.
# 2005
##### Einschneidend
- Einschulung
- erste beste Freundin
- Schulweg alleine gemeistert
- erste Mathe-Note
- Hausaufgabenstress
- erste Klassenfahrt
### Rückblick
##### Der erste Tag
Ich kann mich noch genau erinnern, wie aufgeregt ich war. Die Schultüte war fast größer als ich selbst.
##### Pausenhof
Der Pausenhof wirkte unendlich groß. Alles war neu, laut und irgendwie magisch.
# 2010
##### Einschneidend
- Erster eigener Computer
- Online-Freundschaften
### Rückblick
##### Digitale Welt
Plötzlich stand mir die ganze Welt offen. Ich konnte alles googeln und entdecken.`;

const COLLAPSE_THRESHOLD = 5;

function parseMarkdown(text) {
  const lines = text.split('\n');
  const years = [];
  let current = null;
  let section = null;
  let currentReview = null;

  for (let raw of lines) {
    const line = raw.replace(/\r$/, '');

    if (/^#\s+\d{1,4}\s*$/.test(line.trim())) {
      if (currentReview && current) { current.reviews.push(currentReview); currentReview = null; }
      const year = parseInt(line.trim().replace(/^#\s+/, ''));
      current = { year, events: [], reviews: [] };
      years.push(current);
      section = null;
      continue;
    }
    if (!current) continue;

    if (/^#####\s+einschneidend\s*$/i.test(line.trim())) {
      section = 'events';
      continue;
    }
    if (/^###\s+rückblick\s*$/i.test(line.trim())) {
      if (currentReview) { current.reviews.push(currentReview); currentReview = null; }
      section = 'review';
      continue;
    }
    if (section === 'review' && /^#####\s+/.test(line)) {
      if (currentReview) current.reviews.push(currentReview);
      currentReview = { title: line.replace(/^#####\s+/, '').trim(), content: [] };
      continue;
    }
    if (section === 'events' && /^-\s+/.test(line.trim())) {
      current.events.push(line.replace(/^\s*-\s+/, '').trim());
      continue;
    }
    if (section === 'review' && currentReview && line.trim() !== '') {
      currentReview.content.push(line.trim());
    }
  }
  if (currentReview && current) current.reviews.push(currentReview);
  return years.sort((a, b) => a.year - b.year);
}

const inputView = document.getElementById('inputView');
const timelineView = document.getElementById('timelineView');
const mdInput = document.getElementById('mdInput');
const generateBtn = document.getElementById('generate');
const loadExampleBtn = document.getElementById('loadExample');
const backToInputBtn = document.getElementById('backToInput');
const timeline = document.getElementById('timeline');
const timelineLine = document.getElementById('timelineLine');
const timelineContainer = document.getElementById('timelineContainer');
const modalOverlay = document.getElementById('modalOverlay');
const modalYear = document.getElementById('modalYear');
const modalBody = document.getElementById('modalBody');
const closeModal = document.getElementById('closeModal');
const prevBtn = document.getElementById('prevPage');
const nextBtn = document.getElementById('nextPage');
const dotsEl = document.getElementById('dots');

let allYears = [];
let currentPage = 0;
let currentYearData = null;

loadExampleBtn.onclick = () => { mdInput.value = EXAMPLE; };
backToInputBtn.onclick = () => {
  timelineView.classList.remove('active');
  inputView.classList.remove('hidden');
};

generateBtn.onclick = () => {
  const text = mdInput.value.trim();
  if (!text) { mdInput.focus(); return; }
  allYears = parseMarkdown(text);
  if (allYears.length === 0) {
    alert('Konnte keine Jahre im Markdown finden. Bitte Format prüfen.');
    return;
  }
  renderTimeline();
  inputView.classList.add('hidden');
  timelineView.classList.add('active');
};

function renderTimeline() {
  timeline.querySelectorAll('.year-node').forEach(n => n.remove());

  allYears.forEach((y, idx) => {
    const node = document.createElement('div');
    node.className = 'year-node';
    const hasReviews = y.reviews && y.reviews.length > 0;
    const hasManyEvents = y.events.length >= COLLAPSE_THRESHOLD;

    const eventsHtml = y.events.map(e =>
      `<div class="event"><span class="event-bullet">◆</span><span>${escapeHtml(e)}</span></div>`
    ).join('');

    node.innerHTML = `
      <div class="year-anchor"></div>
      <div class="year-stem"></div>
      <div class="year-card ${hasManyEvents ? 'has-many-events collapsed' : ''}" data-idx="${idx}">
        <div class="year-card-header">
          <span class="year-eyebrow">Anno Domini</span>
          <div class="year-number">${y.year}</div>
          <div class="divider"></div>
        </div>
        <div class="year-card-body">
          <div class="events">${eventsHtml || '<div style="color: var(--text-mute); font-style: italic; font-size: 0.85rem;">Keine Einträge</div>'}</div>
          ${hasReviews ? '<span class="has-review">◆ Rückblick lesen</span>' : ''}
        </div>
        ${hasManyEvents ? `
          <div class="year-summary">
            <strong>${y.events.length} Erlebnisse</strong> in diesem Jahr
          </div>
          <div class="collapse-toggle">
            <span class="collapse-label-more">Mehr anzeigen</span>
            <span class="collapse-label-less">Weniger anzeigen</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
        ` : ''}
      </div>
    `;
    timeline.appendChild(node);

    const card = node.querySelector('.year-card');

    card.addEventListener('click', (e) => {
      if (e.target.closest('.has-review')) {
        e.stopPropagation();
        openModal(idx);
        return;
      }
      if (e.target.closest('.collapse-toggle')) {
        e.stopPropagation();
        card.classList.toggle('collapsed');
        return;
      }
      if (hasManyEvents) {
        card.classList.toggle('collapsed');
      }
    });
  });

  requestAnimationFrame(() => {
    timelineLine.style.width = timeline.scrollWidth + 'px';
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { root: timelineContainer, threshold: 0.15 });

  timeline.querySelectorAll('.year-node').forEach(n => observer.observe(n));

  setTimeout(() => {
    const first = timeline.querySelector('.year-node');
    if (first) first.scrollIntoView({ inline: 'center', block: 'center', behavior: 'instant' });
  }, 100);
}

window.addEventListener('resize', () => {
  if (timelineView.classList.contains('active')) {
    timelineLine.style.width = timeline.scrollWidth + 'px';
  }
});

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openModal(idx) {
  currentYearData = allYears[idx];
  currentPage = 0;
  modalYear.textContent = currentYearData.year;
  renderModal();
  modalOverlay.classList.add('open');
}

function renderModal() {
  const reviews = currentYearData.reviews;
  modalBody.innerHTML = '';

  reviews.forEach((r, i) => {
    const page = document.createElement('div');
    page.className = 'page' + (i === currentPage ? ' active' : '');
    page.innerHTML = `
      <div class="page-indicator"><span class="current">${i + 1}</span> / ${reviews.length}</div>
      <div class="page-chapter">Kapitel ${toRoman(i + 1)}</div>
      <h3>${escapeHtml(r.title)}</h3>
      <div class="page-ornament"></div>
      <p>${escapeHtml(r.content.join('\n'))}</p>
    `;
    modalBody.appendChild(page);
  });

  dotsEl.innerHTML = '';
  reviews.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentPage ? ' active' : '');
    dot.onclick = () => goToPage(i);
    dotsEl.appendChild(dot);
  });

  prevBtn.disabled = currentPage === 0;
  nextBtn.disabled = currentPage === reviews.length - 1;
}

function toRoman(num) {
  const roman = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
  return roman[num - 1] || num;
}

function goToPage(i) {
  if (i === currentPage) return;
  const pages = modalBody.querySelectorAll('.page');
  const dir = i > currentPage ? 1 : -1;
  const current = pages[currentPage];
  const next = pages[i];

  current.classList.remove('active');
  current.style.transform = `translateX(${-50 * dir}px)`;
  current.style.opacity = '0';

  next.style.transform = `translateX(${50 * dir}px)`;
  next.style.opacity = '0';
  requestAnimationFrame(() => {
    next.classList.add('active');
    next.style.transform = 'translateX(0)';
    next.style.opacity = '1';
  });

  currentPage = i;
  dotsEl.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
  prevBtn.disabled = i === 0;
  nextBtn.disabled = i === currentYearData.reviews.length - 1;

  const indicator = next.querySelector('.page-indicator');
  if (indicator) indicator.innerHTML = `<span class="current">${i + 1}</span> / ${currentYearData.reviews.length}`;

  setTimeout(() => {
    modalBody.querySelectorAll('.page').forEach((p, idx) => {
      p.classList.toggle('active', idx === currentPage);
      if (idx !== currentPage) {
        p.style.transform = '';
        p.style.opacity = '';
      }
    });
  }, 500);
}

prevBtn.onclick = () => goToPage(currentPage - 1);
nextBtn.onclick = () => goToPage(currentPage + 1);
closeModal.onclick = () => modalOverlay.classList.remove('open');
modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('open');
});

document.addEventListener('keydown', e => {
  if (!modalOverlay.classList.contains('open')) return;
  if (e.key === 'Escape') modalOverlay.classList.remove('open');
  if (e.key === 'ArrowLeft') prevBtn.onclick();
  if (e.key === 'ArrowRight') nextBtn.onclick();
});

let isDragging = false, startX = 0, scrollStart = 0;
timelineContainer.addEventListener('mousedown', e => {
  if (e.target.closest('.year-card')) return;
  isDragging = true;
  startX = e.pageX;
  scrollStart = timelineContainer.scrollLeft;
  timelineContainer.style.cursor = 'grabbing';
});
timelineContainer.addEventListener('mousemove', e => {
  if (!isDragging) return;
  e.preventDefault();
  timelineContainer.scrollLeft = scrollStart - (e.pageX - startX);
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  timelineContainer.style.cursor = 'grab';
});
</script>
</body>
</html>
